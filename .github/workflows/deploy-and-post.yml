name: 🚀 Deploy & LinkedIn Post

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_linkedin:
        description: 'Deploy only (skip LinkedIn post)'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy:
    name: 📦 Build & Deploy to Netlify
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.netlify.outputs.deploy_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        id: netlify
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --prod --json > /tmp/netlify-result.json 2>/tmp/netlify-error.log
          URL=$(cat /tmp/netlify-result.json | jq -r '.deploy_ssl_url // .url // empty')
          if [ -z "$URL" ]; then
            echo "❌ Deploy failed. Netlify output:"
            cat /tmp/netlify-error.log
            exit 1
          fi
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed: $URL"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ─────────────────────────────────────────────────────────────────────────────
  post-linkedin:
    name: 📣 Post to LinkedIn
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      success() &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_linkedin == false)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate post & publish
        run: node .github/scripts/linkedin-post.mjs
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.deploy_url }}
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
